<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blink — Encrypted Messenger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0a0a0a; color: #ccc; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 40px 20px }
    .wrap { max-width: 520px; text-align: center }
    .icon { font-size: 72px; margin-bottom: 24px }
    h1   { color: #fff; font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 12px }
    p    { color: #888; font-size: 1rem; line-height: 1.7; margin-bottom: 32px }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap }
    a    { color: #4f6ef7; text-decoration: none; font-weight: 600;
           border: 1px solid #4f6ef740; padding: 10px 20px; border-radius: 10px }
    a:hover { background: #4f6ef720 }
    .badge { display: inline-flex; align-items: center; gap: 6px; background: #1a1a2a;
             border: 1px solid #2a2a3a; border-radius: 8px; padding: 6px 12px;
             color: #888; font-size: 13px; margin-top: 40px }
  </style>
</head>
<body>
<div class="wrap">
  <div class="icon">👁️</div>
  <h1>Blink</h1>
  <p>End-to-end encrypted messaging. Your keys, your messages — Blink's servers never see your content.</p>
  <div class="links">
    <a href="privacy-policy.html">Privacy Policy</a>
    <a href="https://github.com/Alexcode519/Blink">Source Code</a>
  </div>
  <div class="badge">🔒 End-to-end encrypted with NaCl</div>
</div>
</body>
</html>
